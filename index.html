    <img class="lbi" id="lbImg" src="" alt="">
    <div class="lbcap" id="lbCap"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PASSWORD GATE
   - id="lockOverlay" (safe; avoids window.screen conflict)
   - onclick attributes on buttons (not addEventListener)
   - Pure synchronous string comparison
   - Both functions defined as globals BEFORE they are called
   ============================================================ */
var _AUTH_KEY = 'bg_auth_v1';
var _AUTH_PWD = 'jwsyle@1991';

function toggleEye() {
  var p = document.getElementById('lockPwd');
  var b = document.getElementById('eyeBtn');
  if (!p) return;
  p.type = p.type === 'password' ? 'text' : 'password';
  b.innerHTML = p.type === 'password' ? '&#128065;' : '&#128584;';
}

function tryUnlock() {
  var p   = document.getElementById('lockPwd');
  var err = document.getElementById('lockErrMsg');
  var btn = document.getElementById('unlockBtn');
  var ov  = document.getElementById('lockOverlay');
  if (!p) return;
  var val = p.value;
  if (!val) { if(err) err.textContent = '&#35831;&#36755;&#20837;&#23494;&#30721;'; return; }
  if (val === _AUTH_PWD) {
    if (err) err.textContent = '';
    if (btn) btn.textContent = '&#10003; &#39564;&#35777;&#25104;&#21151;...';
    try { sessionStorage.setItem(_AUTH_KEY, '1'); } catch(e) {}
    setTimeout(function() {
      if (ov) ov.style.display = 'none';
      document.body.classList.remove('locked');
      loadTab(0);
      restartRefresh();
    }, 250);
  } else {
    if (err) {
      err.textContent = '&#23494;&#30721;&#38169;&#35823;&#65292;&#35831;&#37325;&#35797;';
    }
    p.value = '';
    p.focus();
  }
}

/* Run password gate logic after DOM is ready */
(function initLock() {
  var ov = document.getElementById('lockOverlay');
  var p  = document.getElementById('lockPwd');
  if (!ov || !p) return;
  try {
    var ok = sessionStorage.getItem(_AUTH_KEY) === '1';
    if (ok) {
      ov.style.display = 'none';
      document.body.classList.remove('locked');
      loadTab(0);
      restartRefresh();
    } else {
      document.body.classList.add('locked');
      p.focus();
    }
  } catch(e) {
    document.body.classList.add('locked');
    p.focus();
  }
})();

/* ============================================================
   MAIN APP
   ============================================================ */
var SHEET_ID = '1ewnOl72H3XSZadHP0hiEH0MVmHJ2IdzB7v7ofcmy824';
var SHEETS   = [{gid:'1191971696'},{gid:'1038166537'},{gid:'769966364'},{gid:'482985351'}];
var REFRESH  = 90000;
var tabIdx=0, raw=[], filtered=[], refId=null, dark=false, toastId=null;

function gel(id){return document.getElementById(id)}
function h(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtN(n){if(!n&&n!==0)return'\u2014';var v=+n;if(v>=1e8)return(v/1e8).toFixed(1)+'\u4ebf';if(v>=1e4)return(v/1e4).toFixed(1)+'W';return v.toLocaleString('zh-CN')}
function fmtP(v){var n=parseFloat(v);return isNaN(n)?'\u2014':(n<=1?Math.round(n*100):Math.round(n))+'%'}
function maleW(m,f){var mv=+m||0,fv=+f||0;if(mv<=1&&fv<=1)return Math.round(mv*100);var t=mv+fv;return t?Math.round(mv/t*100):50}
function setBdg(t,c){var el=gel('tb'+t);if(el){el.textContent=c;el.className='tbdg'+(c>0?' show':'')}}
function showToast(msg){var t=gel('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastId);toastId=setTimeout(function(){t.classList.remove('show')},3400)}
function imgErr(img){var w=img.closest('.cimg');if(w){w.innerHTML='<div class="noph"><div class="noph-i">&#128444;&#65039;</div><span>\u56fe\u7247\u65e0\u6cd5\u52a0\u8f7d</span></div>';w.classList.add('noc')}}
window.imgErr=imgErr;

/* Fetch sheet as CSV (works with published sheets and IMPORTRANGE) */
function fetchSheet(gid){
  /* Try 1: gviz CSV via no-cors fetch */
  var csvUrl = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&gid='+gid;
  var expUrl = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+gid;
  function tryFetch(url){
    return fetch(url, {cache:'no-cache'})
      .then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.text();
      })
      .then(function(csv){ return parseCsv(csv); });
  }
  return tryFetch(csvUrl).catch(function(){ return tryFetch(expUrl); });
}

/* Simple robust CSV parser */
function parseCsv(text){
  var rows=[], cur=[], field='', inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i++}
        else inQ=false;
      } else field+=c;
    } else {
      if(c==='"'){inQ=true}
      else if(c===','){cur.push(field);field=''}
      else if(c==='\r'){}
      else if(c==='\n'){cur.push(field);rows.push(cur);cur=[];field=''}
      else field+=c;
    }
  }
  if(field||cur.length){cur.push(field);rows.push(cur);}
  if(!rows.length||rows[0].length<2) throw new Error('\u8868\u683c\u6570\u636e\u4e3a\u7a7a\uff0c\u8bf7\u786e\u8ba4\u5df2\u53d1\u5e03\u5230\u7f51\u7edc');
  var hdrs=rows[0].map(function(h){return h.trim()});
  return rows.slice(1)
    .filter(function(r){return r.some(function(c){return c.trim()!==''})})
    .map(function(r,i){
      var obj={_i:i};
      hdrs.forEach(function(k,j){obj[k]=r[j]!=null?r[j].trim():''});
      return obj;
    });
}

/* Convert flat CSV row objects to our data model */
function csvToRows(rows){
  function fv(row,keys){
    for(var i=0;i<keys.length;i++){
      var k=keys[i];
      for(var rk in row){
        if(rk.toLowerCase()===k)return row[rk]||'';
      }
    }
    return '';
  }
  function fn(row,keys){var v=fv(row,keys);return parseFloat(v)||0;}
  return rows
    .map(function(r,i){return{
      _i:i,
      source:    fv(r,['source']),
      postId:    fv(r,['post id','post_id']),
      postLink:  fv(r,['post link','post_link']),
      totalData: fn(r,['total data','total_data']),
      todayData: fn(r,['today data','today_data']),
      male:      fn(r,['male']),
      female:    fn(r,['female']),
      like:      fn(r,['like','likes']),
      comments:  fn(r,['comments','comment']),
      share:     fn(r,['share','shares']),
      date:      fv(r,['date']),
      type:      fv(r,['type']),
      wordBg:    fv(r,['word_bg','word bg']),
      wordZh:    fv(r,['word_zh','word zh']),
      imageLink: fv(r,['image link','image_link'])
    }})
    .filter(function(d){return d.source});
}

function setSS(s){
  var d=gel('syncDot'),t=gel('syncTxt');
  d.className='sdot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  t.textContent=s==='syncing'?'\u540c\u6b65\u4e2d...':s==='error'?'\u540c\u6b65\u5931\u8d25':'\u5df2\u540c\u6b65';
}

function loadTab(tab){
  setSS('syncing');showState('loading');
  fetchSheet(SHEETS[tab].gid)
    .then(function(rows){
      raw=csvToRows(rows);buildTypes();applyRender();
      var now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      gel('uLbl').textContent='\u4e0a\u6b21\u540c\u6b65: '+now;
      setSS('ok');setBdg(tab,raw.length);
    })
    .catch(function(err){
      var msg=err.message||String(err);
      showState('error',msg);
      setSS('error');
    });
}
function restartRefresh(){clearInterval(refId);refId=setInterval(function(){loadTab(tabIdx)},REFRESH)}

function buildTypes(){
  var prev=gel('fType').value,seen={},types=[];
  raw.forEach(function(d){if(d.type&&!seen[d.type]){seen[d.type]=1;types.push(d.type)}});
  types.sort();
  gel('fType').innerHTML='<option value="">\u5168\u90e8\u7c7b\u578b</option>'+types.map(function(t){return'<option value="'+h(t)+'"'+(t===prev?' selected':'')+'>'+h(t)+'</option>'}).join('');
}

function parseD(s){
  if(!s)return null;var d=new Date(s);if(!isNaN(d))return d;
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  return m?new Date(m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0')):null;
}

function applyRender(){
  var srch=gel('fSearch').value.trim().toLowerCase(),type=gel('fType').value,
      ds=gel('fDateS').value?new Date(gel('fDateS').value):null,
      de=gel('fDateE').value?new Date(gel('fDateE').value+'T23:59:59'):null,
      tr=parseFloat(gel('fTraffic').value)||0,sk=gel('fSort').value||'totalData';
  filtered=raw.filter(function(d){
    if(srch&&d.source.toLowerCase().indexOf(srch)<0)return false;
    if(type&&d.type!==type)return false;
    if(tr&&d.totalData<tr)return false;
    if(ds||de){var dd=parseD(d.date);if(dd){if(ds&&dd<ds)return false;if(de&&dd>de)return false}}
    return true;
  });
  filtered.sort(function(a,b){return(b[sk]||0)-(a[sk]||0)});
  renderCards(filtered);
  gel('cntT').textContent=filtered.length.toLocaleString();
  gel('cntTr').textContent=fmtN(filtered.reduce(function(s,d){return s+(d.totalData||0)},0));
}

function renderCards(data){if(!data.length){showState('empty');return}gel('grid').innerHTML=data.map(function(d,i){return card(d,i)}).join('')}

function card(d,i){
  var hi=!!d.imageLink,mw=maleW(d.male,d.female),delay=Math.min(i*28,320);
  var rc=i<3?' r'+(i+1):'',rl=i===0?'&#129351; #1':i===1?'&#129352; #2':i===2?'&#129353; #3':'#'+(i+1);
  var img=hi?'<img src="'+h(d.imageLink)+'" alt="'+h(d.source)+'" loading="lazy" onerror="imgErr(this)">':'<div class="noph"><div class="noph-i">&#128444;&#65039;</div><span>\u6682\u65e0\u56fe\u7247</span></div>';
  var lnk=d.postLink?'<a href="'+h(d.postLink)+'" target="_blank" rel="noopener" class="clnk">&#128279;</a>':'';
  var bg=d.wordBg?'<div class="tblk"><div class="tlbl">\u539f\u6587</div><div class="tval">'+h(d.wordBg)+'</div><div class="tpop"><div class="pbody">'+h(d.wordBg)+'</div><button class="pcpy" data-copy="'+h(d.wordBg)+'">&#128203; \u590d\u5236\u539f\u6587</button></div></div>':'';
  var zh=d.wordZh?'<div class="tblk"><div class="tlbl">\u4e2d\u6587</div><div class="tval">'+h(d.wordZh)+'</div><div class="tpop"><div class="pbody">'+h(d.wordZh)+'</div><button class="pcpy" data-copy="'+h(d.wordZh)+'">&#128203; \u590d\u5236\u8bd1\u6587</button></div></div>':'';
  return '<div class="card" style="animation-delay:'+delay+'ms"><div class="cimg'+(hi?'':' noc')+'" data-img="'+h(d.imageLink)+'" data-cap="'+h(d.source)+'">'+img+(hi?'<div class="covr"><div class="czoom">&#9974;</div></div>':'')+'<div class="bdg bdg-r'+rc+'">'+rl+'</div>'+(d.type?'<div class="bdg bdg-t">'+h(d.type)+'</div>':'')+'</div><div class="cbody"><div class="cr1"><span class="csrc" title="'+h(d.source)+'">'+h(d.source)+'</span><span class="cdt">&#128197; '+(h(d.date)||'\u2014')+'</span></div><div class="cr2">'+(d.postId?'<span class="cpid">'+h(d.postId)+'</span>':'')+lnk+'</div><div class="ctxt">'+bg+zh+'</div><div class="cmet"><div class="mml"><span class="mmlb">\u603b\u5f15\u6d41</span><span class="mmv">'+fmtN(d.totalData)+'</span></div><div class="mmr"><div class="mmrr"><span class="mmrl">\u4eca\u65e5</span><span class="mmrv">'+fmtN(d.todayData)+'</span></div></div></div><div class="cdemo"><div class="dtop"><span class="dlbl">\u53d7\u4f17\u6027\u522b</span><div class="dpcts"><span class="dm">&#9794; '+fmtP(d.male)+'</span><span class="df">&#9792; '+fmtP(d.female)+'</span></div></div><div class="dbar"><div class="dmf" style="width:'+mw+'%"></div><div class="dff"></div></div></div><div class="cft"><div class="fst">&#128077;<span class="fsv">'+fmtN(d.like)+'</span></div><div class="fst">&#128172;<span class="fsv">'+fmtN(d.comments)+'</span></div><div class="fst">&#8676;<span class="fsv">'+fmtN(d.share)+'</span></div></div></div></div>';
}

function showState(t,msg){
  var errHtml='<div class="state"><div class="sti">&#9888;&#65039;</div>'+
    '<div class="stt">\u52a0\u8f7d\u5931\u8d25</div>'+
    '<div class="sts" style="font-size:12px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;text-align:left;">'+
    '<b style="color:#dc2626">\u9519\u8bef\u4fe1\u606f:</b> '+h(msg||'\u672a\u77e5\u9519\u8bef')+'<br><br>'+
    '<b>\u8bf7\u6309\u4ee5\u4e0b\u6b65\u9aa4\u89e3\u51b3:</b><br>'+
    '1. \u6253\u5f00 Google \u8868\u683c \u2192 \u300c\u6587\u4ef6\u300d\u83dc\u5355 \u2192 \u300c\u5206\u4eab\u300d \u2192 \u300c\u53d1\u5e03\u5230\u7f51\u7edc\u300d<br>'+
    '2. \u9009\u62e9 \u300c\u6574\u4e2a\u6574\u6863\u300d + \u300c\u7f51\u9875\u300d\uff0c\u70b9\u300c\u53d1\u5e03\u300d<br>'+
    '3. \u5237\u65b0\u6b64\u9875\u9762'+
    '</div>'+
    '<button onclick="loadTab(tabIdx)" style="margin-top:14px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">&#8635; \u91cd\u8bd5</button>'+
    '</div>';
  var s={
    loading:'<div class="state"><div class="spin"></div><div class="stt">\u6b63\u5728\u52a0\u8f7d\u6570\u636e...</div></div>',
    empty:'<div class="state"><div class="sti">&#128269;</div><div class="stt">\u6ca1\u6709\u5339\u914d\u7684\u6570\u636e</div><div class="sts">\u5c1d\u8bd5\u8c03\u6574\u7b5b\u9009\u6761\u4ef6\u6216\u5207\u6362\u5206\u8868</div></div>',
    error: errHtml
  };
  gel('grid').innerHTML=s[t]||s.empty;
}

/* LIGHTBOX */
function openLB(src,cap){gel('lbImg').src=src;gel('lbCap').textContent=cap||'';gel('lb').classList.add('open');document.body.style.overflow='hidden'}
function closeLB(){gel('lb').classList.remove('open');gel('lbImg').src='';document.body.style.overflow=''}
gel('lb').addEventListener('click',function(e){if(e.target===gel('lb'))closeLB()});
gel('lbClose').addEventListener('click',closeLB);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLB()});

/* COPY */
function doCopy(text,msg){
  var done=function(){showToast('\u2713 '+(msg||'\u5df2\u590d\u5236'))};
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(done).catch(function(){fb(text,done)});
  else fb(text,done);
}
function fb(text,cb){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb&&cb()}catch(e){}ta.remove()}
function copyAll(){
  if(!filtered.length){showToast('\u26a0\ufe0f \u6ca1\u6709\u53ef\u590d\u5236\u7684\u6570\u636e');return}
  var H=['Source','Post ID','Post Link','Total Data','Today Data','Male','Female','Like','Comments','Share','Date','Type','word_bg','word_zh','Image Link'];
  var R=filtered.map(function(d){return[d.source,d.postId,d.postLink,d.totalData,d.todayData,d.male,d.female,d.like,d.comments,d.share,d.date,d.type,d.wordBg,d.wordZh,d.imageLink].map(function(v){return String(v==null?'':v).replace(/[\t\n\r]/g,' ')})});
  doCopy([H].concat(R).map(function(r){return r.join('\t')}).join('\n'),'\u5df2\u590d\u5236 '+filtered.length+' \u6761\u8bb0\u5f55\uff08\u53ef\u76f4\u63a5\u7c98\u8d34\u5230\u8868\u683c\uff09');
}

gel('grid').addEventListener('click',function(e){
  var iw=e.target.closest('.cimg');
  if(iw&&!iw.classList.contains('noc')&&iw.dataset.img){openLB(iw.dataset.img,iw.dataset.cap);return}
  var cb=e.target.closest('[data-copy]');
  if(cb){e.stopPropagation();doCopy(cb.dataset.copy,'\u5df2\u590d\u5236\u5230\u526a\u8d34\u677f')}
});

/* THEME */
gel('btnT').addEventListener('click',function(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  gel('btnT').innerHTML=dark?'&#9728;&#65039;':'&#127769;';
});
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){
  dark=true;document.documentElement.setAttribute('data-theme','dark');
  gel('btnT').innerHTML='&#9728;&#65039;';
}

/* TABS */
gel('bnav').addEventListener('click',function(e){
  var b=e.target.closest('.tbtn');if(!b)return;
  var t=+b.dataset.tab;if(t===tabIdx)return;
  tabIdx=t;
  document.querySelectorAll('.tbtn').forEach(function(x,i){x.classList.toggle('active',i===t)});
  resetF(false);loadTab(t);restartRefresh();
});

/* FILTER EVENTS */
function dbnc(fn,ms){var tid;return function(){clearTimeout(tid);tid=setTimeout(fn,ms)}}
var lazy=dbnc(applyRender,280);
gel('fSearch').addEventListener('input',lazy);
gel('fTraffic').addEventListener('input',lazy);
gel('fType').addEventListener('change',applyRender);
gel('fDateS').addEventListener('change',applyRender);
gel('fDateE').addEventListener('change',applyRender);
gel('fSort').addEventListener('change',applyRender);
gel('btnReset').addEventListener('click',function(){resetF(true)});
gel('btnCopy').addEventListener('click',copyAll);
gel('btnR').addEventListener('click',function(){loadTab(tabIdx)});
document.addEventListener('keydown',function(e){if(e.key==='r'&&!e.ctrlKey&&!e.metaKey&&document.activeElement.tagName!=='INPUT')loadTab(tabIdx)});
function resetF(re){
  gel('fSearch').value=gel('fType').value=gel('fDateS').value=gel('fDateE').value=gel('fTraffic').value='';
  gel('fSort').value='totalData';
  if(re&&raw.length)applyRender();
}
</script>
