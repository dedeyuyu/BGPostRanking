<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG 帖文排行 [DEBUG]</title>
  <style>
    /* --- Error overlay --- */
    #dbgPanel{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;
      background:#dc2626;color:#fff;padding:12px 16px;font-family:monospace;
      font-size:13px;word-break:break-all;line-height:1.5;max-height:200px;overflow-y:auto}
    /* --- Lock screen --- */
    body{margin:0;font-family:system-ui,sans-serif}
    #lockOverlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;
      justify-content:center;background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a)}
    .lbox{width:360px;max-width:90vw;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
      border-radius:20px;padding:40px 32px;text-align:center;color:#fff}
    .lbox h2{margin:0 0 6px;font-size:20px}
    .lbox p{margin:0 0 24px;font-size:13px;opacity:.5}
    .irow{position:relative;margin-bottom:12px}
    #lockPwd{width:100%;height:44px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
      border-radius:10px;color:#fff;font-size:15px;padding:0 48px 0 14px;
      outline:none;box-sizing:border-box;font-family:inherit;letter-spacing:1px}
    #lockPwd:focus{border-color:rgba(99,102,241,.8)}
    #lockEyeBtn{position:absolute;right:0;top:0;height:44px;width:44px;background:none;
      border:none;cursor:pointer;font-size:18px;color:rgba(255,255,255,.5);
      display:flex;align-items:center;justify-content:center;z-index:10}
    #lockEyeBtn:hover{color:#fff}
    #lockBtn{width:100%;height:44px;background:linear-gradient(135deg,#2563eb,#7c3aed);
      border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;
      cursor:pointer;margin-top:4px}
    #lockBtn:hover{opacity:.9}
    #lockErr{margin-top:10px;font-size:13px;color:#f87171;min-height:18px}
    #dbgInfo{margin-top:16px;font-size:11px;color:rgba(255,255,255,.3);text-align:left;line-height:1.6}
    /* --- Main app hidden while locked --- */
    body.locked .app-shell{visibility:hidden}
    .app-shell{color:#333;padding:20px;font-family:system-ui,sans-serif}
  </style>
</head>
<body>

<!-- DEBUG PANEL: shows JS errors -->
<div id="dbgPanel">
  <b>&#9888; JavaScript Error:</b><br>
  <span id="dbgMsg">none</span>
</div>

<!-- LOCK SCREEN -->
<div id="lockOverlay">
  <div class="lbox">
    <div style="font-size:36px;margin-bottom:12px">&#128274;</div>
    <h2>BG 帖文排行</h2>
    <p>请输入访问密码</p>
    <div class="irow">
      <input id="lockPwd" type="password" placeholder="输入密码..." autocomplete="current-password">
      <button id="lockEyeBtn" type="button" title="显示/隐藏密码">&#128065;</button>
    </div>
    <button id="lockBtn" type="button">解锁访问</button>
    <div id="lockErr"></div>
    <div id="dbgInfo">调试信息加载中...</div>
  </div>
</div>

<!-- MAIN APP SHELL (shown after unlock) -->
<div class="app-shell">
  <div style="padding:20px;text-align:center;color:#888;font-size:14px">
    登录后内容将在此显示
  </div>
</div>

<script>
/* ===== GLOBAL ERROR CATCHER ===== */
var dbgLog = [];
function dbg(msg) {
  dbgLog.push(msg);
  var panel = document.getElementById('dbgPanel');
  var msgEl = document.getElementById('dbgMsg');
  var info  = document.getElementById('dbgInfo');
  if(panel) panel.style.display = 'block';
  if(msgEl) msgEl.innerHTML = dbgLog.map(function(m){return '&bull; '+m}).join('<br>');
  if(info)  info.textContent = 'Debug: ' + msg;
  console.error('[BG DEBUG]', msg);
}
window.onerror = function(msg, src, line, col) {
  dbg('JS ERROR: ' + msg + ' (line ' + line + ')');
  return false;
};
window.onunhandledrejection = function(e) {
  dbg('Promise rejection: ' + (e.reason ? e.reason.message || String(e.reason) : 'unknown'));
};

/* ===== STEP LOGGER ===== */
function step(name) {
  var info = document.getElementById('dbgInfo');
  if(info) info.textContent = 'Step: ' + name;
  console.log('[BG STEP]', name);
}

/* ===== DOM HELPERS ===== */
function gel(id) {
  var el = document.getElementById(id);
  if(!el) dbg('Element not found: #' + id);
  return el;
}

step('Script start');

/* ===== PASSWORD GATE ===== */
var AUTH_KEY = 'bg_auth_v1';
var AUTH_PWD = 'jwsyle@1991';

function doUnlock() {
  step('doUnlock');
  try {
    var ov = document.getElementById('lockOverlay');
    if(ov) ov.style.display = 'none';
    document.body.classList.remove('locked');
    dbg = function(){}; // silence debug after unlock
    step('Unlocked OK');
  } catch(ex) {
    dbg('doUnlock error: ' + ex.message);
  }
}

function tryUnlock() {
  step('tryUnlock called');
  try {
    var pwd = document.getElementById('lockPwd');
    var err = document.getElementById('lockErr');
    var btn = document.getElementById('lockBtn');
    if(!pwd){ dbg('lockPwd missing'); return; }
    var val = pwd.value;
    step('Got value, length=' + val.length);
    if(!val){ if(err) err.textContent = '请输入密码'; return; }
    if(val === AUTH_PWD) {
      step('Password correct! Unlocking...');
      if(err) err.textContent = '';
      if(btn) btn.textContent = '✓ 验证成功';
      try{ sessionStorage.setItem(AUTH_KEY, '1'); } catch(ex){ dbg('sessionStorage: ' + ex.message); }
      setTimeout(doUnlock, 300);
    } else {
      step('Password wrong');
      if(err){ err.textContent = '密码错误，请重试（长度:' + val.length + '）'; }
      pwd.value = '';
      pwd.focus();
    }
  } catch(ex) {
    dbg('tryUnlock error: ' + ex.message + ' stack:' + (ex.stack||''));
  }
}

function toggleEye() {
  step('toggleEye');
  try {
    var p = document.getElementById('lockPwd');
    var e = document.getElementById('lockEyeBtn');
    if(!p){ dbg('lockPwd not found in toggleEye'); return; }
    p.type = p.type === 'password' ? 'text' : 'password';
    if(e) e.innerHTML = p.type === 'password' ? '&#128065;' : '&#128584;';
    step('Eye toggled, now: ' + p.type);
  } catch(ex) {
    dbg('toggleEye error: ' + ex.message);
  }
}

/* Expose as global onclick targets */
window.tryUnlock  = tryUnlock;
window.toggleEye  = toggleEye;

step('Globals defined, setting up DOM...');

/* ===== SET UP LOCK SCREEN ===== */
(function setupLock() {
  try {
    step('setupLock start');
    var ov  = document.getElementById('lockOverlay');
    var pwd = document.getElementById('lockPwd');
    var btn = document.getElementById('lockBtn');
    var eye = document.getElementById('lockEyeBtn');

    if(!ov)  dbg('lockOverlay not found');
    if(!pwd) dbg('lockPwd not found');
    if(!btn) dbg('lockBtn not found');
    if(!eye) dbg('lockEyeBtn not found');

    if(!pwd || !btn || !eye || !ov) {
      dbg('Critical: missing DOM elements, cannot setup lock');
      return;
    }

    step('All elements found OK');

    /* Check existing session */
    var alreadyAuth = false;
    try { alreadyAuth = sessionStorage.getItem(AUTH_KEY) === '1'; } catch(ex){ dbg('sessionStorage read: '+ex.message); }

    if(alreadyAuth) {
      step('Already authenticated, unlocking');
      doUnlock();
      return;
    }

    /* Show lock, bind events */
    document.body.classList.add('locked');
    btn.onclick = tryUnlock;
    eye.onclick = toggleEye;
    pwd.onkeydown = function(e){ if(e.key === 'Enter') tryUnlock(); };
    pwd.focus();

    step('Lock screen ready, events bound');

    var info = document.getElementById('dbgInfo');
    if(info) info.textContent = '就绪: JS 运行正常，请输入密码';

  } catch(ex) {
    dbg('setupLock error: ' + ex.message + ' | stack: ' + (ex.stack || ''));
  }
})();
</script>
</body>
</html>
